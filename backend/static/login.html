<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>INVIQ — Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface":              "#0a1730",
        "surface-container":    "#0f2040",
        "surface-container-high":"#152a52",
        "surface-variant":      "#1d3866",
        "on-surface":           "#ffffff",
        "on-surface-variant":   "#bdbdbd",
        "outline":              "#9a9a9a",
        "outline-variant":      "#2c4a80",
        "primary":              "#8052ff",
        "on-primary":           "#ffffff",
        "primary-container":    "#6a3ce8",
        "tertiary":             "#ffb829",
        "error":                "#ff7a92",
        "error-container":      "#3a0d16",
      },
      fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
    },
  },
}
</script>
<link rel="stylesheet" href="/static/css/app.css"/>
<style>
  #hive-canvas {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    z-index: 0; pointer-events: none;
    /* fade toward edges so the form stays legible */
    -webkit-mask-image: radial-gradient(ellipse 95% 95% at 50% 45%, #000 60%, transparent 100%);
            mask-image: radial-gradient(ellipse 95% 95% at 50% 45%, #000 60%, transparent 100%);
  }
  .login-shell { position: relative; z-index: 10; }
  /* darken directly behind the form for contrast */
  .login-shell::before {
    content: ''; position: absolute; inset: -30px -40px; z-index: -1;
    background: radial-gradient(ellipse 90% 75% at 50% 50%, rgba(10,23,48,0.78) 40%, transparent 100%);
    pointer-events: none;
  }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">

<div class="bg-mesh"></div>
<canvas id="hive-canvas" data-size="30" data-grab="0.85" data-reach="230" data-bulge="200" data-flow="2.8"></canvas>

<div class="login-shell w-full max-w-sm">
  <!-- Logo / branding -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center gap-3 mb-4">
      <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL' 1">qr_code_scanner</span>
      <span class="font-normal text-4xl tracking-tight text-on-surface" style="letter-spacing:-0.03em">INVIQ</span>
    </div>
    <p class="text-outline text-sm font-light">Sistema de Inventário por QR Code</p>
  </div>

  <!-- Form — floats on the void, no card container -->
  <div class="px-1">
    <h1 class="text-lg font-normal text-on-surface mb-6" style="letter-spacing:-0.01em">Entrar como administrador</h1>

    <form id="form-login" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm text-outline mb-1.5" for="email">Email</label>
        <input
          id="email" name="email" type="email" autocomplete="email"
          required placeholder="admin@empresa.com"
          class="w-full rounded-xl bg-surface-variant border border-outline-variant px-3.5 py-2.5 text-on-surface placeholder-outline text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm text-outline mb-1.5" for="senha">Senha</label>
        <div class="relative">
          <input
            id="senha" name="senha" type="password" autocomplete="current-password"
            required placeholder="••••••••"
            class="w-full rounded-xl bg-surface-variant border border-outline-variant px-3.5 py-2.5 pr-10 text-on-surface placeholder-outline text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
          />
          <button type="button" id="btn-toggle-senha"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition"
            tabindex="-1">
            <span class="material-symbols-outlined text-lg" id="icon-olho">visibility</span>
          </button>
        </div>
      </div>

      <!-- Erro -->
      <div id="erro" class="hidden rounded-xl bg-error-container text-error px-3 py-2 text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">error</span>
        <span id="erro-msg"></span>
      </div>

      <button
        type="submit" id="btn-submit"
        class="w-full rounded-full bg-primary text-on-primary font-semibold py-3 text-sm hover:brightness-110 active:scale-[.98] transition flex items-center justify-center gap-2 mt-2"
      >
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">login</span>
        Entrar
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-outline mt-8 font-light">
    Primeiro acesso? Execute <code class="font-mono text-tertiary">python criar_admin.py</code> no servidor.
  </p>
</div>

<script>
const form   = document.getElementById('form-login')
const btn    = document.getElementById('btn-submit')
const erroEl = document.getElementById('erro')
const erroMsg = document.getElementById('erro-msg')

// Já logado? Redireciona.
if (sessionStorage.getItem('inviq_token')) {
  window.location.replace('/')
}

document.getElementById('btn-toggle-senha').addEventListener('click', () => {
  const inp  = document.getElementById('senha')
  const icon = document.getElementById('icon-olho')
  if (inp.type === 'password') {
    inp.type = 'text'
    icon.textContent = 'visibility_off'
  } else {
    inp.type = 'password'
    icon.textContent = 'visibility'
  }
})

form.addEventListener('submit', async (e) => {
  e.preventDefault()
  erroEl.classList.add('hidden')
  btn.disabled = true
  btn.innerHTML = '<span class="material-symbols-outlined text-base animate-spin">progress_activity</span> Entrando...'

  const email = document.getElementById('email').value.trim()
  const senha = document.getElementById('senha').value

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha }),
    })
    const data = await res.json()

    if (!res.ok) {
      throw new Error(data.detail || 'Erro ao fazer login.')
    }

    sessionStorage.setItem('inviq_token', data.access_token)
    sessionStorage.setItem('inviq_admin', JSON.stringify(data.admin))
    window.location.replace('/')
  } catch (err) {
    erroMsg.textContent = err.message
    erroEl.classList.remove('hidden')
    btn.disabled = false
    btn.innerHTML = '<span class="material-symbols-outlined text-base" style="font-variation-settings:\'FILL\' 1">login</span> Entrar'
  }
})
</script>
<script src="/static/js/hive.js"></script>
</body>
</html>
