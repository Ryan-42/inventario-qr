<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>INVIQ — Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface":              "#071325",
        "surface-container":    "#142032",
        "surface-container-high":"#1f2a3d",
        "surface-variant":      "#2a3548",
        "on-surface":           "#d7e3fc",
        "on-surface-variant":   "#bcc8d1",
        "outline":              "#87929b",
        "outline-variant":      "#3d4850",
        "primary":              "#8fd6ff",
        "on-primary":           "#003549",
        "primary-container":    "#00bfff",
        "tertiary":             "#10eb8a",
        "error":                "#ffb4ab",
        "error-container":      "#93000a",
      },
      fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
    },
  },
}
</script>
<link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo / branding -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-3 mb-3">
      <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings:'FILL' 1">qr_code_scanner</span>
      <span class="font-black text-3xl tracking-tight text-on-surface">INVIQ</span>
    </div>
    <p class="text-on-surface-variant text-sm">Sistema de Inventário por QR Code</p>
  </div>

  <!-- Card -->
  <div class="bg-surface-container rounded-2xl p-8 border border-outline-variant shadow-xl">
    <h1 class="text-xl font-bold text-on-surface mb-6">Entrar como administrador</h1>

    <form id="form-login" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1" for="email">Email</label>
        <input
          id="email" name="email" type="email" autocomplete="email"
          required placeholder="admin@empresa.com"
          class="w-full rounded-lg bg-surface-variant border border-outline-variant px-3 py-2.5 text-on-surface placeholder-outline text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1" for="senha">Senha</label>
        <div class="relative">
          <input
            id="senha" name="senha" type="password" autocomplete="current-password"
            required placeholder="••••••••"
            class="w-full rounded-lg bg-surface-variant border border-outline-variant px-3 py-2.5 pr-10 text-on-surface placeholder-outline text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
          />
          <button type="button" id="btn-toggle-senha"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition"
            tabindex="-1">
            <span class="material-symbols-outlined text-lg" id="icon-olho">visibility</span>
          </button>
        </div>
      </div>

      <!-- Erro -->
      <div id="erro" class="hidden rounded-lg bg-error-container text-error px-3 py-2 text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">error</span>
        <span id="erro-msg"></span>
      </div>

      <button
        type="submit" id="btn-submit"
        class="w-full rounded-lg bg-primary text-on-primary font-semibold py-2.5 text-sm hover:opacity-90 active:scale-[.98] transition flex items-center justify-center gap-2 mt-2"
      >
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">login</span>
        Entrar
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-outline mt-6">
    Primeiro acesso? Execute <code class="font-mono text-tertiary">python criar_admin.py</code> no servidor.
  </p>
</div>

<script>
const form   = document.getElementById('form-login')
const btn    = document.getElementById('btn-submit')
const erroEl = document.getElementById('erro')
const erroMsg = document.getElementById('erro-msg')

// Já logado? Redireciona.
if (sessionStorage.getItem('inviq_token')) {
  window.location.replace('/')
}

document.getElementById('btn-toggle-senha').addEventListener('click', () => {
  const inp  = document.getElementById('senha')
  const icon = document.getElementById('icon-olho')
  if (inp.type === 'password') {
    inp.type = 'text'
    icon.textContent = 'visibility_off'
  } else {
    inp.type = 'password'
    icon.textContent = 'visibility'
  }
})

form.addEventListener('submit', async (e) => {
  e.preventDefault()
  erroEl.classList.add('hidden')
  btn.disabled = true
  btn.innerHTML = '<span class="material-symbols-outlined text-base animate-spin">progress_activity</span> Entrando...'

  const email = document.getElementById('email').value.trim()
  const senha = document.getElementById('senha').value

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha }),
    })
    const data = await res.json()

    if (!res.ok) {
      throw new Error(data.detail || 'Erro ao fazer login.')
    }

    sessionStorage.setItem('inviq_token', data.access_token)
    sessionStorage.setItem('inviq_admin', JSON.stringify(data.admin))
    window.location.replace('/')
  } catch (err) {
    erroMsg.textContent = err.message
    erroEl.classList.remove('hidden')
    btn.disabled = false
    btn.innerHTML = '<span class="material-symbols-outlined text-base" style="font-variation-settings:\'FILL\' 1">login</span> Entrar'
  }
})
</script>
</body>
</html>
