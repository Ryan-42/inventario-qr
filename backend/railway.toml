[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand removido: o CMD do Dockerfile executa entrypoint.sh,
# que roda "alembic upgrade head" antes de subir o gunicorn.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
