# CI — roda a suíte de testes a cada push/PR.
# O deploy no Render é automático a partir do main; este workflow é o único
# gate antes de produção, então mantenha-o verde.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Rodar testes (SQLite in-memory)
        run: pytest tests/ -q --tb=short

      - name: Alembic deve ter exatamente 1 head
        run: |
          HEADS=$(python -m alembic heads | wc -l)
          echo "heads: $HEADS"
          test "$HEADS" -eq 1

      - name: entrypoint.sh deve estar em LF (CRLF quebra o boot do container)
        working-directory: .
        run: |
          if grep -q $'\r' backend/entrypoint.sh; then
            echo "::error::backend/entrypoint.sh contém CRLF"
            exit 1
          fi
